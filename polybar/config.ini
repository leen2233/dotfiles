include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/fonts.ini
include-file = $HOME/.config/polybar/modules/i3.ini
include-file = $HOME/.config/polybar/modules/date.ini
include-file = $HOME/.config/polybar/modules/round-left.ini
include-file = $HOME/.config/polybar/modules/round-right.ini
include-file = $HOME/.config/polybar/modules/pulseaudio.ini
include-file = $HOME/.config/polybar/modules/cpu.ini
include-file = $HOME/.config/polybar/modules/memory.ini
include-file = $HOME/.config/polybar/modules/network.ini
include-file = $HOME/.config/polybar/modules/title.ini
include-file = $HOME/.config/polybar/modules/sep.ini
include-file = $HOME/.config/polybar/modules/temperature.ini
include-file = $HOME/.config/polybar/modules/screenshot.ini
include-file = $HOME/.config/polybar/modules/networkspeed.ini
include-file = $HOME/.config/polybar/modules/battery.ini
include-file = $HOME/.config/polybar/modules/taskwarrior.ini
include-file = $HOME/.config/polybar/modules/age.ini

[bar/main]
width =  100%
height = 20
border-size = 5
line-size = 1
border-color = ${colors.background}
background = ${colors.background}
font-0 = "Hack Nerd Font:style=Regular:size=10;2"
font-1 = "Hack Nerd Font:size=13;3"
modules-left = round-left i3 round-right sep round-left memory cpu round-right sep round-left taskwarrior round-right
modules-center = round-left title round-right
modules-right = round-left age round-right sep round-left networkspeed round-right sep round-left date round-right sep round-left pulseaudio round-right
tray-detached = false
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 10
tray-maxsize = 20
tray-scale = 1.0
tray-position = right

